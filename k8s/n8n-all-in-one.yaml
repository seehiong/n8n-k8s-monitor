apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    service: n8n-claim0
  name: n8n-claim0
  namespace: n8n
spec:
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: Secret
metadata:
  namespace: n8n
  name: n8n-telegram-secret
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: "123456789:AAF-your-bot-token-here"
  TELEGRAM_CHAT_ID: "-1001234567890"
---
apiVersion: v1
data:
  N8N_DEFAULT_BINARY_DATA_MODE: filesystem
  N8N_ENCRYPTION_KEY: super-secret-key
  N8N_LISTEN_ADDRESS: 0.0.0.0
  N8N_RUNNERS_ENABLED: "true"
  N8N_USER_MANAGEMENT_JWT_SECRET: even-more-secret
  N8N_SECURE_COOKIE: "true"
  N8N_URL: "https://n8n.local"
  WEBHOOK_URL: "https://n8n.local/"
  N8N_PROXY_HOPS: "1"
  GENERIC_TIMEZONE: "Asia/Singapore"
  N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
kind: ConfigMap
metadata:
  labels:
    service: n8n-env
  name: n8n-env
  namespace: n8n
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: n8n
  name: n8n
  namespace: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      service: n8n
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        service: n8n
    spec:
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown 1000:1000 /data"]
          volumeMounts:
            - name: n8n-claim0
              mountPath: /data
        - name: copy-tools
          image: seehiong/n8n-tools:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "cp /usr/local/bin/kubectl /tools/kubectl && cp /usr/local/bin/talosctl /tools/talosctl"]
          volumeMounts:
            - name: tools-bin
              mountPath: /tools
      containers:
        # Main n8n container
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:2.11.3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
          args:
            - -c
            - sleep 5; n8n start
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres-service.n8n.svc.cluster.local
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: n8n
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_USER
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_PASSWORD
            - name: N8N_PROTOCOL
              value: https
            - name: N8N_PORT
              value: "5678"
            - name: N8N_RUNNERS_MODE
              value: external
            - name: N8N_RUNNERS_BROKER_LISTEN_ADDRESS
              value: 0.0.0.0
            - name: N8N_RUNNERS_AUTH_TOKEN
              value: my-n8n-runners-secure-token
            - name: N8N_NATIVE_PYTHON_RUNNER
              value: "true"
            - name: N8N_LOG_LEVEL
              value: debug
            - name: N8N_RUNNERS_LAUNCHER_LOG_LEVEL
              value: debug
            - name: NODES_EXCLUDE
              value: "[]"
            - name: TALOSCONFIG
              value: /var/run/secrets/talos/config
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-telegram-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: n8n-telegram-secret
                  key: TELEGRAM_CHAT_ID
          envFrom:
            - configMapRef:
                name: n8n-env
          ports:
            - containerPort: 5678
              protocol: TCP
            - containerPort: 5679  # Task runner broker port
              protocol: TCP
          volumeMounts:
            - mountPath: /home/node/.n8n
              name: n8n-claim0
            - name: tools-bin
              mountPath: /usr/local/bin/kubectl
              subPath: kubectl
              readOnly: true
            - name: tools-bin
              mountPath: /usr/local/bin/talosctl
              subPath: talosctl
              readOnly: true
            - name: talos-config
              mountPath: /var/run/secrets/talos
              readOnly: true
            - name: kube-api
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
        # Tools sidecar with kubectl + talosctl
        - name: tools
          image: seehiong/n8n-tools:latest
          imagePullPolicy: Always
          command: ["sleep", "infinity"]
          env:
            - name: TALOSCONFIG
              value: /var/run/secrets/talos/config
          volumeMounts:
            - name: kube-api
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            - name: talos-config
              mountPath: /var/run/secrets/talos
              readOnly: true
        # Task runners container
        - name: n8n-runners
          image: n8nio/runners:2.11.3
          imagePullPolicy: Always
          env:
            - name: N8N_RUNNERS_TASK_BROKER_URI
              value: http://localhost:5679
            - name: N8N_RUNNERS_AUTH_TOKEN
              value: my-n8n-runners-secure-token
            - name: N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT
              value: "15"

      restartPolicy: Always
      volumes:
        - name: tools-bin
          emptyDir: {}
        - name: n8n-claim0
          persistentVolumeClaim:
            claimName: n8n-claim0
        - name: postgres-secret
          secret:
            secretName: postgres-secret
        - name: talos-config
          secret:
            secretName: talos-config
        - name: kube-api
          projected:
            sources:
            - serviceAccountToken:
                path: token
                expirationSeconds: 3600
            - configMap:
                name: kube-root-ca.crt
                items:
                - key: ca.crt
                  path: ca.crt
            - downwardAPI:
                items:
                - path: namespace
                  fieldRef:
                    fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: n8n
  name: n8n
  namespace: n8n
spec:
  type: ClusterIP
  ports:
    - name: "5678"
      port: 80
      targetPort: 5678
      protocol: TCP
  selector:
    service: n8n